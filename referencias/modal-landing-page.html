<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal creado con createElement()</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            padding: 3rem;
            background: #f5f7fa;
        }

        h1 {
            margin-bottom: 1rem;
        }

        p {
            margin-bottom: 2rem;
        }

        button {
            cursor: pointer;
        }

        /* =========================
           BOTÓN PRINCIPAL
        ========================== */

        .donate-btn {
            background: #198754;
            color: white;

            border: none;
            border-radius: 8px;

            padding: 1rem 2rem;
            font-size: 1rem;

        }

        .donate-btn:hover {
            background: #157347;
        }

        /* =========================
           OVERLAY
        ========================== */

        .modal-overlay {
            position: fixed;
            inset: 0;

            background: rgba(0, 0, 0, .6);

            display: flex;
            justify-content: center;
            align-items: center;

            display: none;
        }

        .modal-overlay.active {
            display: flex;
        }

        /* =========================
           MODAL
        ========================== */

        .modal {
            background: white;

            width: 450px;
            max-width: 90%;

            padding: 2rem;

            border-radius: 15px;

            position: relative;

        }

        .modal h2 {
            margin-bottom: 1rem;
            color: #198754;
        }

        .modal p {
            margin-bottom: 1.5rem;
        }

        /* =========================
           BOTÓN CERRAR
        ========================== */

        .close-btn {
            position: absolute;

            top: 15px;
            right: 15px;

            width: 35px;
            height: 35px;

            border: none;
            border-radius: 50%;

            background: #eeeeee;

            font-size: 1rem;
        }

        /* =========================
           FORMULARIO
        ========================== */

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: .5rem;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;

            padding: .8rem;

            border: 1px solid #cccccc;
            border-radius: 8px;
        }

        .submit-btn {
            width: 100%;

            border: none;
            border-radius: 8px;

            background: #198754;
            color: white;

            padding: 1rem;

            font-size: 1rem;
        }

        .submit-btn:hover {
            background: #157347;
        }
    </style>
</head>

<body>

    <h1>Modal Test</h1>

    <p>
        Este ejemplo demuestra cómo crear un modal dinámicamente
        utilizando <strong>createElement()</strong>,
        <strong>innerHTML</strong> y
        <strong>appendChild()</strong>.
    </p>

    <button class="donate-btn" onclick="openModal()">
        Donar ahora
    </button>

    <script>

        // =====================================
        // 1. CREAR EL OVERLAY
        // =====================================

        const modalOverlay = document.createElement('div');

        modalOverlay.classList.add('modal-overlay');

        // =====================================
        // 2. DEFINIR EL HTML DEL MODAL
        // =====================================

        modalOverlay.innerHTML = `
        
        <div class="modal">

            <button class="close-btn" onclick="closeModal()">
                ✕
            </button>

            <h2>
                Sumate a la causa
            </h2>

            <p>
                Tu ayuda permite seguir desarrollando
                proyectos educativos y sociales.
            </p>

            <form>

                <div class="form-group">

                    <label>Nombre</label>

                    <input type="text" placeholder="Tu nombre">

                </div>

                <div class="form-group">

                    <label>Email</label>

                    <input type="email" placeholder="correo@email.com">

                </div>

                <button type="submit" class="submit-btn">

                    Donar ahora

                </button>

            </form>

        </div>

        `;

        // =====================================
        // 3. AGREGAR AL DOM
        // =====================================

        document.body.appendChild(modalOverlay);

        // =====================================
        // 4. MOSTRAR MODAL
        // =====================================

        function openModal() {

            modalOverlay.classList.add('active');

        }

        // =====================================
        // 5. OCULTAR MODAL
        // =====================================

        function closeModal() {

            modalOverlay.classList.remove('active');

        }

    </script>

</body>

<!-- Este ejemplo es ideal para explicar la secuencia completa:

document.createElement() → crear un nodo HTML desde JavaScript.
classList.add() → asignar clases CSS.
innerHTML → definir la estructura interna del modal.
appendChild() → insertar el elemento en el DOM.
classList.add("active") → mostrar el modal.
classList.remove("active") → ocultarlo nuevamente. -->

</html>
