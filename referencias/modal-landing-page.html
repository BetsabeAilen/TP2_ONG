<!--
    PROYECTO: modal-landing-page — Modal dinámico con createElement
    OBJETIVO: Crear un overlay/modal de donación desde JavaScript al cargar la página,
    mostrarlo/ocultarlo intercambiando la clase CSS "active".
-->
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal creado con createElement()</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            padding: 3rem;
            background: #f5f7fa;
        }

        h1 {
            margin-bottom: 1rem;
        }

        p {
            margin-bottom: 2rem;
        }

        button {
            cursor: pointer;
        }

        /* =========================
           BOTÓN PRINCIPAL
        ========================== */

        .donate-btn {
            background: #198754;
            color: white;

            border: none;
            border-radius: 8px;

            padding: 1rem 2rem;
            font-size: 1rem;

        }

        .donate-btn:hover {
            background: #157347;
        }

        /* =========================
           OVERLAY
        ========================== */

        .modal-overlay {
            position: fixed;
            inset: 0;

            background: rgba(0, 0, 0, .6);

            display: flex;
            justify-content: center;
            align-items: center;

            display: none;
        }

        .modal-overlay.active {
            display: flex;
        }

        /* =========================
           MODAL
        ========================== */

        .modal {
            background: white;

            width: 450px;
            max-width: 90%;

            padding: 2rem;

            border-radius: 15px;

            position: relative;

        }

        .modal h2 {
            margin-bottom: 1rem;
            color: #198754;
        }

        .modal p {
            margin-bottom: 1.5rem;
        }

        /* =========================
           BOTÓN CERRAR
        ========================== */

        .close-btn {
            position: absolute;

            top: 15px;
            right: 15px;

            width: 35px;
            height: 35px;

            border: none;
            border-radius: 50%;

            background: #eeeeee;

            font-size: 1rem;
        }

        /* =========================
           FORMULARIO
        ========================== */

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: .5rem;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;

            padding: .8rem;

            border: 1px solid #cccccc;
            border-radius: 8px;
        }

        .submit-btn {
            width: 100%;

            border: none;
            border-radius: 8px;

            background: #198754;
            color: white;

            padding: 1rem;

            font-size: 1rem;
        }

        .submit-btn:hover {
            background: #157347;
        }
    </style>
</head>

<body>

    <!-- Contenido visible de la landing page -->
    <h1>Modal Test</h1>

    <p>
        Este ejemplo demuestra cómo crear un modal dinámicamente
        utilizando <strong>createElement()</strong>,
        <strong>innerHTML</strong> y
        <strong>appendChild()</strong>.
    </p>

    <!-- Botón que llama openModal() para mostrar el overlay -->
    <button class="donate-btn" onclick="openModal()">
        Donar ahora
    </button>

    <script>

        /*
         * ALGORITMO COMPLETO DEL MODAL:
         *
         * AL CARGAR LA PÁGINA (ejecución inmediata):
         *   1. createElement('div') → crear overlay en memoria
         *   2. classList.add('modal-overlay') → clase base (oculto por CSS)
         *   3. innerHTML → cargar estructura del modal (formulario, botón cerrar)
         *   4. appendChild → insertar overlay en body (sigue oculto)
         *
         * AL HACER CLICK EN "Donar ahora":
         *   5. openModal() → classList.add('active') → CSS lo hace visible
         *
         * AL HACER CLICK EN "✕":
         *   6. closeModal() → classList.remove('active') → CSS lo oculta
         */

        // PASO 1 — Crear el div overlay (fondo oscuro semitransparente)
        const modalOverlay = document.createElement('div');

        // PASO 2 — Clase CSS: position fixed, display none por defecto
        modalOverlay.classList.add('modal-overlay');

        // PASO 3 — HTML interno: modal blanco con formulario de donación
        modalOverlay.innerHTML = `
        
        <div class="modal">

            <button class="close-btn" onclick="closeModal()">
                ✕
            </button>

            <h2>
                Sumate a la causa
            </h2>

            <p>
                Tu ayuda permite seguir desarrollando
                proyectos educativos y sociales.
            </p>

            <form>

                <div class="form-group">

                    <label>Nombre</label>

                    <input type="text" placeholder="Tu nombre">

                </div>

                <div class="form-group">

                    <label>Email</label>

                    <input type="email" placeholder="correo@email.com">

                </div>

                <button type="submit" class="submit-btn">

                    Donar ahora

                </button>

            </form>

        </div>

        `;

        // PASO 4 — Insertar overlay en el DOM (permanece oculto hasta openModal)
        document.body.appendChild(modalOverlay);

        // PASO 5 — Mostrar modal: agrega clase "active" → display: flex en CSS
        function openModal() {
            modalOverlay.classList.add('active');
        }

        // PASO 6 — Ocultar modal: quita clase "active" → display: none en CSS
        function closeModal() {
            modalOverlay.classList.remove('active');
        }

    </script>

</body>

<!-- Este ejemplo es ideal para explicar la secuencia completa:

document.createElement() → crear un nodo HTML desde JavaScript.
classList.add() → asignar clases CSS.
innerHTML → definir la estructura interna del modal.
appendChild() → insertar el elemento en el DOM.
classList.add("active") → mostrar el modal.
classList.remove("active") → ocultarlo nuevamente. -->

</html>
