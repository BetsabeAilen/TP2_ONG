<!--
    PROYECTO: Clase JS Tarde — Lección 10: Condicionales
    OBJETIVO: Aprender if/else, operadores lógicos y de comparación
    para controlar el flujo del programa según condiciones.
-->
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10 — Condicionales</title>
</head>

<body>

    <script>
        /*
         * ═══════════════════════════════════════════
         * PASO 1 — Condicional if / else
         * Ejecuta código distinto según si una condición es true o false.
         * ═══════════════════════════════════════════
         */

        // prompt() muestra un cuadro de diálogo y devuelve lo que escribe el usuario (string)
        let numero = prompt("Ingresa tu edad:");

        if (numero > 17) {
            // Si la edad es mayor a 17 → rama verdadera
            alert("Eres mayor, puedes continuar.");
        } else {
            // Si no → rama falsa: redirige a Google
            alert("Eres menor, saliendo de la página.");
            window.location.href = "https://www.google.com";
        }

        /*
         * ═══════════════════════════════════════════
         * PASO 2 — Operadores LÓGICOS
         * Combinan múltiples condiciones.
         * ═══════════════════════════════════════════
         */

        // AND (&&): ambas condiciones deben ser true
        if (condicion1 && condicion2) {
            // Solo entra si condicion1 Y condicion2 son true
        }

        // OR (||): al menos una condición debe ser true
        if (condicion1 || condicion2) {
            // Entra si condicion1 O condicion2 es true
        }

        // NOT (!): invierte true ↔ false
        if (!condicion) {
            // Entra si condicion es false
        }

        /*
         * ═══════════════════════════════════════════
         * PASO 3 — Operadores de COMPARACIÓN
         * ═══════════════════════════════════════════
         */

        // ==  igualdad débil (convierte tipos antes de comparar)
        if (valor1 == valor2) { }

        // !=  desigualdad débil
        if (valor1 != valor2) { }

        // ===  igualdad estricta (valor Y tipo deben coincidir)
        if (valor1 === valor2) { }

        // !==  desigualdad estricta
        if (valor1 !== valor2) { }

        // >   mayor que
        if (valor1 > valor2) { }

        // <   menor que
        if (valor1 < valor2) { }

        // >=  mayor o igual
        if (valor1 >= valor2) { }

        // <=  menor o igual
        if (valor1 <= valor2) { }
    </script>
</body>

</html>
