    PROYECTO: Clase JS Tarde — Lección 16: Selectores CSS avanzados
    OBJETIVO: Referencia de selectores CSS usables también en querySelector/querySelectorAll.
-->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>16 — Selectores CSS</title>
    <style>
        /* Este bloque está vacío; los selectores se documentan en el script */
    </style>
</head>
<body>

    <script>
        /*
         * Estos strings son selectores CSS válidos para usar en:
         *   document.querySelector('...')
         *   document.querySelectorAll('...')
         *   element.matches('...')
         */

        // ═══ PASO 1 — Selectores BÁSICOS ═══
        '#header'       // Por ID (único en la página)
        '.menu-item'    // Por clase
        'div'           // Por etiqueta HTML

        // ═══ PASO 2 — COMBINADORES (relaciones entre elementos) ═══
        'div p'         // Descendiente: <p> en cualquier nivel dentro de <div>
        'div > p'       // Hijo directo: <p> hijo inmediato de <div>
        'h2 + p'        // Hermano adyacente: <p> justo después de <h2>
        'h2 ~ p'        // Hermanos generales: todos los <p> después de <h2>

        // ═══ PASO 3 — Selectores de ATRIBUTOS ═══
        'input[type="text"]'    // Input cuyo type es "text"
        'a[href^="https"]'      // Enlaces cuyo href EMPIEZA con "https"
        'img[src$=".jpg"]'      // Imágenes cuyo src TERMINA en ".jpg"
        'div[class*="error"]'   // Divs cuya clase CONTIENE "error"

        // ═══ PASO 4 — PSEUDO-CLASES (estado del elemento) ═══
        'button:hover'          // Al pasar el cursor
        'tr:nth-child(odd)'     // Filas impares de tabla
        'input:focus'           // Input con foco activo
        'li:first-child'        // Primer hijo de su padre
        'a:not(.external)'      // Enlaces SIN clase "external"
        'p:empty'               // Párrafos sin contenido
        'input:checked'         // Checkboxes/radios seleccionados
        'input:disabled'        // Inputs deshabilitados

        // ═══ PASO 5 — PSEUDO-ELEMENTOS (partes del contenido) ═══
        'p::first-line'         // Primera línea de un párrafo
        'p::first-letter'       // Primera letra de un párrafo
        'div::before'           // Contenido generado ANTES del div
        'div::after'            // Contenido generado DESPUÉS del div
        'span::selection'       // Texto seleccionado por el usuario

        // ═══ PASO 6 — COMBINACIONES avanzadas ═══
        'div > p.highlight'     // Párrafos destacados hijos directos de div
        'ul li:first-child'     // Primer item de lista
        'ul li:last-child'      // Último item de lista
        'ul li:nth-child(2n)'   // Items pares (2, 4, 6...)
        'div p::first-letter'   // Primera letra de párrafos dentro de div
    </script>
</body>
</html>
