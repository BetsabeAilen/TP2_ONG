<!--
    PROYECTO: Clase JS Tarde — Lección 09: Funciones
    OBJETIVO: Aprender las distintas formas de declarar funciones, parámetros,
    callbacks, funciones async/await e IIFE en JavaScript.
-->
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>09 — Funciones</title>
</head>

<body>

    <script>
        /*
         * ═══════════════════════════════════════════
         * PASO 1 — Formas de DECLARAR funciones
         * ═══════════════════════════════════════════
         */

        // 1a — Declaración de función (hoisted: se puede usar antes de declararla)
        function nombre() {
            // ...código de la función...
        }

        // 1b — Expresión de función (asignada a una variable)
        const suma = function (a, b) {
            return a + b;
        };

        // 1c — Función flecha ES6+ (sintaxis más corta)
        const suma2 = (a, b) => {
            return a + b;
        };

        // 1d — Flecha con return implícito (una sola expresión)
        const suma3 = (a, b) => a + b;

        // 1e — Funciones anónimas (sin nombre, útiles como callbacks)
        const funcionAnonima = function () {
            console.log('Soy una función anónima');
        };
        const funcionAnonimaFlecha = () => {
            console.log('Soy una función anónima flecha');
        };

        /*
         * ═══════════════════════════════════════════
         * PASO 2 — PARÁMETROS y argumentos
         * Los parámetros son variables locales dentro de la función.
         * ═══════════════════════════════════════════
         */

        // Parámetro con valor por defecto
        function saludar(nombre = 'Usuario') {
            return `Hola ${nombre}`;
        }
        console.log(saludar('Juan'));  // "Hola Juan" — argumento 'Juan' → parámetro nombre
        console.log(saludar());        // "Hola Usuario" — sin argumento, usa el default

        // Múltiples parámetros con defaults
        function saludarCompleto(nombre = 'Usuario', apellido = 'Apellido') {
            return `Hola ${nombre} ${apellido}`;
        }
        console.log(saludarCompleto('Juan', 'Pérez')); // "Hola Juan Pérez"

        /*
         * ═══════════════════════════════════════════
         * PASO 3 — Funciones ESPECIALES
         * ═══════════════════════════════════════════
         */

        // 3a — Callback: función pasada como argumento a otra función
        setTimeout(function () {
            console.log('Ejecutado después de 1s');
        }, 1000);

        // 3b — IIFE: función que se ejecuta inmediatamente al definirse
        (function () {
            console.log('Se ejecuta inmediatamente');
        })();

        // IIFE con parámetros
        (function (a, b) {
            console.log(a + b); // 8
        })(5, 3);

        /*
         * ═══════════════════════════════════════════
         * PASO 4 — Funciones ASYNC / AWAIT
         * Para operaciones asíncronas (fetch, timers, etc.)
         * ═══════════════════════════════════════════
         */
        async function obtenerDatos() {
            const respuesta = await fetch('https://api.example.com/data'); // Espera respuesta HTTP
            const datos = await respuesta.json();                          // Espera parseo JSON
            return datos;
        }

        /*
         * ═══════════════════════════════════════════
         * PASO 5 — PATRÓN CALLBACK
         * Una función recibe otra función para ejecutarla cuando termine.
         * ═══════════════════════════════════════════
         */
        function procesarDatos(datos, callback) {
            const resultado = datos.toUpperCase(); // Procesamiento
            callback(resultado);                 // Ejecuta la función recibida
        }

        procesarDatos('hola', function (res) {
            console.log(res); // "HOLA"
        });
    </script>
</body>

</html>
