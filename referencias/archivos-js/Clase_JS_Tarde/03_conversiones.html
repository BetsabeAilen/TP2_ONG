<!--
    PROYECTO: Clase JS Tarde — Lección 03: Conversiones de tipos
    OBJETIVO: Aprender conversiones explícitas (forzadas) e implícitas (automáticas)
    entre String, Number y Boolean en JavaScript.
-->
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>03 — Conversiones de tipos</title>
</head>

<body>

    <script>
        /*
         * ═══════════════════════════════════════════
         * PARTE A — Conversiones EXPLÍCITAS (forzadas)
         * El programador indica explícitamente el tipo destino.
         * ═══════════════════════════════════════════
         */

        // PASO 1 — Convertir a String
        String(123);          // "123" — función global
        (123).toString();     // "123" — método del número

        // PASO 2 — Convertir a Number
        Number("42");         // 42 — convierte todo el string
        parseInt("42px");     // 42 — parsea enteros (ignora lo que sigue)
        parseFloat("3.14");   // 3.14 — parsea decimales
        +"123";               // 123 — operador unario + fuerza conversión numérica

        // PASO 3 — Convertir a Boolean
        Boolean(1);           // true
        Boolean(0);           // false
        Boolean(null);        // false
        Boolean(undefined);   // false
        !"texto";             // false — negación convierte a boolean y lo invierte
        !!"texto";            // true — doble negación = conversión a true

        /*
         * ═══════════════════════════════════════════
         * PARTE B — Conversiones IMPLÍCITAS (automáticas)
         * JavaScript convierte tipos solo cuando lo necesita.
         * ═══════════════════════════════════════════
         */

        // PASO 4 — En condicionales: strings no vacíos son "truthy"
        if ("texto") {
            console.log("Esto se ejecuta porque 'texto' es truthy");
        }

        // PASO 5 — En operaciones aritméticas
        let resultado = "5" + 2;  // "52" — el + con string concatena
        resultado = "5" - 2;      // 3 — resta fuerza conversión a number
        resultado = "5" * 2;      // 10
        resultado = "5" / 2;      // 2.5
        console.log(resultado);

        // PASO 6 — En comparaciones
        console.log("5" == 5);    // true — == compara valores (convierte tipos)
        console.log("5" === 5);   // false — === compara valor Y tipo (estricta)
        console.log("5" != 5);    // false
        console.log("5" !== 5);   // true

        // PASO 7 — En operadores lógicos (&&, ||)
        console.log("texto" && 42);              // 42 — devuelve el último truthy
        console.log(0 || "texto");               // "texto" — devuelve el primer truthy
        console.log(null || "valor por defecto"); // "valor por defecto"

        // PASO 8 — En funciones: los argumentos se convierten según el uso
        function saludar(nombre) {
            console.log("Hola, " + nombre); // + con string concatena → convierte a string
        }
        saludar("Mundo");  // "Hola, Mundo"
        saludar(42);       // "Hola, 42"
        saludar();         // "Hola, undefined"

        // PASO 9 — En objetos
        let obj = { nombre: "Juan" };
        console.log(obj);              // { nombre: "Juan" }
        console.log(obj.toString());   // "[object Object]"
        console.log(obj.valueOf());    // { nombre: "Juan" }

        // PASO 10 — En arrays
        let arr = [1, 2, 3];
        console.log(arr);              // [1, 2, 3]
        console.log(arr.toString());   // "1,2,3"
        console.log(arr.valueOf());    // [1, 2, 3]

        // PASO 11 — En fechas
        let fecha = new Date();
        console.log(fecha);
        console.log(fecha.toString()); // fecha como string legible
        console.log(fecha.valueOf());  // milisegundos desde 1970 (timestamp)
    </script>
</body>

</html>
