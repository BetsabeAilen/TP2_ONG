<!--
    PROYECTO: Clase JS Tarde — Lección 07: Manipulación del DOM
    OBJETIVO: Referencia de métodos para crear, modificar, insertar,
    clonar, eliminar y reemplazar nodos HTML desde JavaScript.
-->
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>07 — Manipulación del DOM</title>
</head>

<body>

    <script>
        /*
         * ═══════════════════════════════════════════
         * PASO 1 — CREAR elementos nuevos en memoria
         * Aún no aparecen en pantalla hasta insertarlos en el DOM.
         * ═══════════════════════════════════════════
         */
        const nuevoDiv = document.createElement('div');           // Crea etiqueta <div>
        const nuevoTexto = document.createTextNode('Hola mundo'); // Crea nodo de texto puro

        /*
         * ═══════════════════════════════════════════
         * PASO 2 — MODIFICAR propiedades de un elemento existente
         * ═══════════════════════════════════════════
         */
        elemento.textContent = 'Nuevo texto';              // Solo texto (seguro, sin HTML)
        elemento.innerHTML = '<strong>Texto</strong> con HTML'; // Interpreta etiquetas HTML
        elemento.setAttribute('id', 'nuevoId');              // Agrega/modifica atributo HTML
        elemento.classList.add('nueva-clase');             // Agrega clase CSS
        elemento.classList.remove('clase-vieja');          // Quita clase CSS
        elemento.classList.toggle('clase-activa');         // Agrega si no existe, quita si existe
        elemento.style.color = 'blue';                     // Estilo inline (camelCase en JS)
        // background-color (CSS) → backgroundColor (JavaScript)

        /*
         * ═══════════════════════════════════════════
         * PASO 3 — INSERTAR elementos en el árbol del DOM
         * ═══════════════════════════════════════════
         */
        padre.appendChild(elemento);           // Al final del padre (tradicional)
        padre.insertBefore(nuevo, referencia); // Justo antes del nodo "referencia"
        padre.prepend(elemento);               // Al principio (moderno)
        padre.append(elemento);                // Al final (moderno, acepta múltiples)

        /*
         * ═══════════════════════════════════════════
         * PASO 4 — CLONAR un elemento existente
         * ═══════════════════════════════════════════
         */
        const clon = elemento.cloneNode(true); // true = copia profunda (incluye hijos)

        /*
         * ═══════════════════════════════════════════
         * PASO 5 — ELIMINAR elementos del DOM
         * ═══════════════════════════════════════════
         */
        elemento.remove();              // Moderno: el elemento se elimina a sí mismo
        padre.removeChild(elemento);    // Tradicional: el padre elimina al hijo

        /*
         * ═══════════════════════════════════════════
         * PASO 6 — REEMPLAZAR un elemento por otro
         * ═══════════════════════════════════════════
         */
        padre.replaceChild(nuevo, viejo); // Sustituye "viejo" por "nuevo" dentro de "padre"
    </script>
</body>

</html>
