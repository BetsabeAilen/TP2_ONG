<!--
    PROYECTO: Clase JS Tarde — Lección 05: Selectores del DOM
    OBJETIVO: Aprender los métodos tradicionales y modernos para seleccionar
    elementos HTML desde JavaScript.
-->
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>05 — Selectores del DOM</title>
</head>

<body>

    <script>
        /*
         * ═══════════════════════════════════════════
         * PARTE A — Métodos TRADICIONALES
         * Existen desde las primeras versiones de JavaScript en el navegador.
         * ═══════════════════════════════════════════
         */

        // PASO 1 — Seleccionar UN elemento por su atributo id (único en la página)
        document.getElementById('miId');

        // PASO 2 — Seleccionar TODOS los elementos con una clase → devuelve HTMLCollection
        document.getElementsByClassName('miClase');

        // PASO 3 — Seleccionar TODOS los elementos de una etiqueta → HTMLCollection
        document.getElementsByTagName('div');

        // PASO 4 — Seleccionar por atributo name (común en formularios) → NodeList
        document.getElementsByName('username');

        // PASO 5 — Acceder a un elemento individual de la colección por índice
        // elemento[0].style.color = 'red';

        /*
         * ═══════════════════════════════════════════
         * PARTE B — Métodos MODERNOS (querySelector)
         * Usan la misma sintaxis que los selectores CSS. Recomendados hoy.
         * ═══════════════════════════════════════════
         */

        // PASO 6 — querySelector: devuelve el PRIMER elemento que coincida
        document.querySelector('.clase');           // por clase CSS
        document.querySelector('#id');              // por id
        document.querySelector('div');              // por etiqueta
        document.querySelector('[data-atributo]');  // por atributo personalizado

        // PASO 7 — querySelectorAll: devuelve TODOS los que coincidan → NodeList
        document.querySelectorAll('.clase');
        document.querySelectorAll('div.highlight');      // etiqueta + clase
        document.querySelectorAll('input[type="text"]'); // por atributo
        document.querySelectorAll('ul li');              // descendiente
        document.querySelectorAll('p');
    </script>
</body>

</html>
