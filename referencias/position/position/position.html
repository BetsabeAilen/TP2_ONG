<!--
    PROYECTO: position — Posicionamiento CSS con position: absolute
    OBJETIVO: Demostrar cómo colocar 9 imágenes en distintas posiciones
    de la pantalla usando absolute + transform para centrar.
-->
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>position — Posicionamiento absoluto</title>
    <style>
        /* PASO 1 — Reset básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* PASO 2 — Todas las imágenes usan position: absolute (respecto al body) */
        img {
            position: absolute;
        }

        /* PASO 3 — Imagen 2: centrada horizontalmente (top-left por defecto) */
        img:nth-child(2) {
            left: 50%;
            transform: translateX(-50%)  /* Mueve la mitad de su ancho hacia la izquierda */
        }

        /* PASO 4 — Imagen 3: esquina superior derecha */
        img:nth-child(3) {
            right: 0;
        }

        /* PASO 5 — Imagen 4: borde izquierdo, centrada verticalmente */
        img:nth-child(4) {
            left: 0;
            top: 50%;
            transform: translateY(-50%)
        }

        /* PASO 6 — Imagen 5: centro exacto de la pantalla */
        img:nth-child(5) {
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%); /* Centrado horizontal y vertical */
        }

        /* PASO 7 — Imagen 6: borde derecho, centrada verticalmente */
        img:nth-child(6) {
            right: 0;
            top: 50%;
            transform: translateY(-50%)
        }

        /* PASO 8 — Imagen 7: esquina inferior izquierda */
        img:nth-child(7) {
            left: 0;
            bottom: 0;
        }

        /* PASO 9 — Imagen 8: borde inferior, centrada horizontalmente */
        img:nth-child(8) {
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
        }

        /* PASO 10 — Imagen 9: esquina inferior derecha */
        img:nth-child(9) {
            right: 0;
            bottom: 0;
        }
    </style>
</head>

<body>

    <!-- 9 imágenes idénticas posicionadas en las 9 zonas de una grilla 3×3 -->
    <img src="magritte.jpg" width="200"> <!-- 1: esquina superior izquierda (default) -->
    <img src="magritte.jpg" width="200"> <!-- 2: borde superior centro -->
    <img src="magritte.jpg" width="200"> <!-- 3: esquina superior derecha -->
    <img src="magritte.jpg" width="200"> <!-- 4: borde izquierdo centro -->
    <img src="magritte.jpg" width="200"> <!-- 5: centro exacto -->
    <img src="magritte.jpg" width="200"> <!-- 6: borde derecho centro -->
    <img src="magritte.jpg" width="200"> <!-- 7: esquina inferior izquierda -->
    <img src="magritte.jpg" width="200"> <!-- 8: borde inferior centro -->
    <img src="magritte.jpg" width="200"> <!-- 9: esquina inferior derecha -->

</body>

</html>
