<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        img {
            position: absolute;
        }

        img:nth-child(2) {
            left: 50%;
            transform: translateX(-50%)
        }

        img:nth-child(3) {
            right: 0;
        }

        img:nth-child(4) {
            left: 0;
            top: 50%;
            transform: translateY(-50%)
        }

        img:nth-child(5) {
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        img:nth-child(6) {
            right: 0;
            top: 50%;
            transform: translateY(-50%)
        }

        img:nth-child(7) {
            left: 0;
            bottom: 0;
        }

        img:nth-child(8) {
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
        }

        img:nth-child(9) {
            right: 0;
            bottom: 0;
        }
    </style>
</head>

<body>

    <img src="magritte.jpg" width="200">
    <img src="magritte.jpg" width="200">
    <img src="magritte.jpg" width="200">
    <img src="magritte.jpg" width="200">
    <img src="magritte.jpg" width="200">
    <img src="magritte.jpg" width="200">
    <img src="magritte.jpg" width="200">
    <img src="magritte.jpg" width="200">
    <img src="magritte.jpg" width="200">

</body>

</html>
