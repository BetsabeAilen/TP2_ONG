<!--
    PROYECTO: calculadoraImpacto — Calculadora de impacto de donaciones
    OBJETIVO: Al hacer click en "Donar", JavaScript crea un modal dinámico
    que calcula cuántos kits escolares se pueden comprar con el monto ingresado.
    (Copia en subcarpeta calculadoraImpacto/)
-->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Impacto</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .modalStyle {
            background-color: rgb(18, 85, 185);
            width: 50%;
            height: 50%;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        p { color: white; }
    </style>
</head>
<body>

    <button id="donar" onclick="abrirModal()">Donar</button>

    <script src="script.js"></script>
</body>
</html>
